<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BETA* 4</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="intro">

    <video
        id="intro-video"
        autoplay
        muted
        playsinline>

        <source
            src="videos/Persona 3 Reload Makoto Yuki Wallpaper(1080P_HD).mp4"
            type="video/mp4">

    </video>

</div>

<div id="menu-container">

    <!-- Fundo -->

    <div id="background">

        <div class="bg-layer layer1"></div>
        <div class="bg-layer layer2"></div>
        <div class="bg-layer layer3"></div>

        <div id="noise"></div>

        <div id="particles"></div>

    </div>

    <!-- Formas decorativas -->

    <div id="decorations">

        <div class="slash slash1"></div>
        <div class="slash slash2"></div>
        <div class="slash slash3"></div>
        <div class="slash slash4"></div>

    </div>

    <!-- Personagem -->

    <div id="character-container">

        <img
            id="character"
            src="img/nubanko.png"
            alt="Nubanko">

    </div>

    <!-- Logo -->

    <header id="logo">

        <div id="logo-background"></div>

        <h1>

            <span>BETA*</span>

            <small>Capítulo 4</small>

        </h1>

        <p id="tagline">

            Contos de um futuro esquecido

        </p>

    </header>

    <!-- Menu -->

    <nav id="main-menu">

        <button class="menu-button selected">

            <span class="indicator"></span>

            JOGAR

        </button>

        <button class="menu-button">

            <span class="indicator"></span>

            CRÉDITOS

        </button>

        <button class="menu-button">

            <span class="indicator"></span>

            SAIR

        </button>

    </nav>

    <!-- Rodapé -->

    <footer id="footer">

        <div id="version">

            Version 0.1

        </div>

        <div id="copyright">

           2026 © Guará Games / Nubankojima

        </div>

    </footer>

    <!-- Overlay de transição -->

    <div id="transition-overlay">

        <div class="transition-piece t1"></div>
        <div class="transition-piece t2"></div>
        <div class="transition-piece t3"></div>
        <div class="transition-piece t4"></div>
        <div class="transition-piece t5"></div>

    </div>

</div>

<audio id="menu-music" controls>
    <source src="sons/price.mp3" type="audio/mpeg">
</audio>
<script src="script.js"></script>
</body>
</html>
